# =============================================================================
# EXAMPLE: Plain GitHub-native caller for the build-test-release workflow
# =============================================================================
# Copy this file into your project's .github/workflows/ directory (for
# example as release.yaml) and adjust the `uses:` ref and the optional
# `with:` overrides to suit your project.
#
# This is Model A: the TAG-DRIVEN release model. The version comes from a
# validated, signed semver tag; the reusable workflow builds, tests,
# audits, attaches artefacts to a draft GitHub release and promotes it.
# Optional Nexus publishing (nexus_publish: true) runs after promotion
# using the 1Password credential model (OP_SERVICE_ACCOUNT_TOKEN +
# VAULT_MAPPING_JSON secrets).
#
# REGISTRY-NATIVE TRUSTED PUBLISHING MAY NEED TO LIVE HERE, CALLER-SIDE.
# OIDC/trusted-publishing mechanisms (e.g. npm trusted publishing) match
# the OIDC job_workflow_ref claim against THIS repository, so a reusable
# workflow cannot always act as the trusted publisher. The reusable
# workflow exposes a `tag` output and leaves the run-scoped build
# artefact in place, so caller-side publish jobs (stacked after the
# `release` job below) have everything they need.
# =============================================================================
name: 'Build/Test/Release'

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - '**'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  release:
    name: 'Build/Test/Release'
    # Skip tag deletion events
    if: "!github.event.deleted"
    permissions:
      contents: write       # Create the GitHub release / attach assets
      id-token: write       # OIDC for build provenance attestations
      attestations: write   # Build provenance attestations
    # Pin to a specific node-workflows release SHA in production
    # instead of the mutable @main reference.
    # yamllint disable-line rule:line-length
    uses: lfreleng-actions/node-workflows/.github/workflows/build-test-release.yaml@main
    # All inputs are optional. Uncomment and tune only what your project
    # needs; everything else falls back to sensible defaults.
    # with:
    #   path_prefix: '.'              # project root (monorepo subdir, etc.)
    #   node_version: ''              # override Node.js auto-detection
    #   build_tool: ''                # 'npm' or 'yarn'; empty auto-detects
    #   attestations: true            # build provenance attestations
    #   sigstore_sign: true           # Sigstore-sign the npm tarball
    #   nexus_publish: true           # publish to a Nexus npm registry
    #   registry_url: 'https://nexus3.example.org/repository/npm.release/'
    # Uncomment the secrets block when nexus_publish is true:
    # secrets:
    #   OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    #   VAULT_MAPPING_JSON: ${{ secrets.VAULT_MAPPING_JSON }}

# Caller-side registry publish jobs go here, stacked after the release
# job, consuming `needs.release.outputs.tag` and the run-scoped build
# artefact, when a registry-native trusted-publishing flow applies.
