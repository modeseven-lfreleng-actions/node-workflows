# =============================================================================
# EXAMPLE: Plain GitHub-native caller for the reusable merge workflow
# =============================================================================
# Model B (merge-driven snapshots + releases/ file-triggered releases) is
# PRIMARILY a Gerrit pattern, generalising the Jenkins-heritage LF flow —
# see gerrit.yaml in this directory for the canonical caller. This
# GitHub-native variant serves projects that adopt the same model on a
# plain GitHub repository: every push (merge) to a main branch publishes
# a snapshot, and a merged release file under releases/ triggers a
# release publish.
#
# Copy this file into your project's .github/workflows/ directory (for
# example as merge.yaml) and adjust the `uses:` ref to suit your project.
# =============================================================================
name: 'Merge/Publish'

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  merge:
    name: 'Merge/Publish'
    permissions:
      contents: read
    # Pin to a specific node-workflows release SHA in production
    # instead of the mutable @main reference.
    # yamllint disable-line rule:line-length
    uses: lfreleng-actions/node-workflows/.github/workflows/merge.yaml@main
    with:
      # REQUIRED: the Nexus npm registries receiving publishes
      # yamllint disable-line rule:line-length
      snapshot_registry_url: 'https://nexus3.example.org/repository/npm.snapshot/'
      # yamllint disable-line rule:line-length
      release_registry_url: 'https://nexus3.example.org/repository/npm.release/'
      # Optional tuning:
      # path_prefix: '.'              # project root (monorepo subdir, etc.)
      # node_version: ''              # override Node.js auto-detection
      # build_tool: ''                # 'npm' or 'yarn'; empty auto-detects
      # harden_runner_egress: 'block' # 'block' (default) or 'audit'
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      VAULT_MAPPING_JSON: ${{ secrets.VAULT_MAPPING_JSON }}
