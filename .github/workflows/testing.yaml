---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Exercises the reusable build-test workflow against pinned downstream
# Node.js fixture repositories, in parallel, to prove the pipeline
# (job graph, metadata detection, harden-runner wiring, dual checkout,
# build/test/audit legs, SBOM/Grype chain) functions end-to-end.
#
# The reusable workflow is referenced by LOCAL path so this always
# validates the current branch's workflows.
#
# The build-test-release and merge workflows are NOT self-tested here:
# build-test-release requires a signed semver tag-push context (and
# creates/promotes GitHub releases), and merge requires a merged-commit
# context (and would exercise Nexus credential loading and publish
# legs); neither is available or safe on a pull request. Instantiating
# repositories validate those through their own release/merge cycles.
name: 'Testing 🧪'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  # Node.js fixture repositories, fanned out in parallel via a matrix:
  # a modern npm project and a legacy 2020-era ONAP project, pinned to
  # exact commits so runs stay reproducible.
  build-test:
    name: 'Build/Test'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'test-node-project'
            repository: 'lfreleng-actions/test-node-project'
            ref: '89cc7f156c88afa1855087b00ac0dce886e7b0f3'
            node_version: ''
            test_permit_fail: false
            audit_permit_fail: false
            grype_permit_fail: false
          - name: 'sdc-onap-ui-common'
            repository: 'onap/sdc-onap-ui-common'
            ref: 'c305ee4240e368dd0b2238a4f39881a97bad6746'
            # Legacy toolchain: the repository declares no engines or
            # .nvmrc, and its 2020-era dependency tree needs Node 16
            node_version: '16'
            # The legacy dependency tree fails tests on modern runners
            test_permit_fail: true
            # No lockfile in the repository, so this leg exercises the
            # node-audit-action lockfile synthesis; the legacy
            # dependency tree carries known audit findings
            audit_permit_fail: true
            # 2020-era dependencies trip the Grype severity gate
            grype_permit_fail: true
    permissions:
      contents: read
      pull-requests: read  # repository-metadata-action queries PR data
    uses: ./.github/workflows/build-test.yaml
    with:
      repository: ${{ matrix.repository }}
      ref: ${{ matrix.ref }}
      node_version: ${{ matrix.node_version }}
      test_permit_fail: ${{ matrix.test_permit_fail }}
      audit_permit_fail: ${{ matrix.audit_permit_fail }}
      grype_permit_fail: ${{ matrix.grype_permit_fail }}
